name: Build App

on: workflow_dispatch

jobs:
  build:

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      if: runner.os == 'Windows'
      run: pyinstaller --onefile --noconsole --name CloudZeroVideoEditor --copy-metadata imageio --copy-metadata imageio-ffmpeg --collect-all moviepy --collect-all proglog cloudzero_video_editor.py

    - name: Build macOS
      if: runner.os == 'macOS'
      run: pyinstaller --windowed --name CloudZeroVideoEditor --copy-metadata imageio --copy-metadata imageio-ffmpeg --collect-all moviepy --collect-all proglog cloudzero_video_editor.py

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ runner.os }}
        path: dist/
