name: Build App

on: workflow_dispatch

jobs:

  build-macos:
    runs-on: macos-14
  
    steps:
    - uses: actions/checkout@v4
  
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
  
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
  
    - name: Build macOS
      run: arch -x86_64 pyinstaller --name CloudZeroVideoEditor --copy-metadata imageio --copy-metadata imageio-ffmpeg --collect-all moviepy --collect-all proglog --collect-all imageio_ffmpeg --collect-all PySide6 cloudzero_video_editor.py
  
    - name: Upload macOS build
      uses: actions/upload-artifact@v4
      with:
        name: build-macos
        path: dist/
